function mkSvg(path,color,bg){
  const d=document.createElement('div');
  d.style.cssText=`width:100%;height:100%;border-radius:inherit;background:${bg};display:flex;align-items:center;justify-content:center;`;
  d.innerHTML=`<svg viewBox="0 0 24 24" width="60%" height="60%" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
  return d;
}
function mkDuotone(id){
  const d=document.createElement('div');
  const grad=DTGRADIENTS[id]||'linear-gradient(135deg,#6366F1,#818CF8)';
  const shadow=DTSHADOWS[id]||'rgba(99,102,241,.35)';
  const path=SVGPATHS[id]||SVGPATHS['autres'];
  d.style.cssText=`width:100%;height:100%;border-radius:inherit;background:${grad};box-shadow:0 4px 14px ${shadow};display:flex;align-items:center;justify-content:center;`;
  d.innerHTML=`<svg viewBox="0 0 24 24" width="58%" height="58%" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
  return d;
}

}

function h(tag,p,...k){
  const e=document.createElement(tag);
  if(p)for(const[a,v]of Object.entries(p)){
    if(v==null||v===false)continue;
    if(a==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(a.startsWith("on"))e.addEventListener(a.slice(2).toLowerCase(),v);
    else if(a==="value")e.value=v;
    else e.setAttribute(a,v);
  }
  for(const c of k.flat(9)){if(c==null||c===false)continue;e.append(c.nodeType?c:String(c));}
  return e;
}

function authScreen(){
  const s=S;

    if(s.al)return;set({aerr:"",al:true},true);
    try{
      if(s.am==="register"){
        if(!s.an.trim()){set({aerr:"Entrez votre prénom",al:false});return;}

        await c.user.updateProfile({displayName:s.an.trim()});
        set({au:"app",user:c.user,al:false});sub();
      }else{const c=await auth.signInWithEmailAndPassword(s.ae,s.ap);set({au:"app",user:c.user,al:false});sub();}
    }catch(e){const m={"auth/user-not-found":"Email inconnu","auth/wrong-password":"Mot de passe incorrect","auth/email-already-in-use":"Email déjà utilisé","auth/weak-password":"6 caractères minimum","auth/invalid-email":"Email invalide","auth/invalid-credential":"Email ou mot de passe incorrect"};set({aerr:m[e.code]||e.message,al:false});}
  }
