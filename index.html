  d.innerHTML=`<svg viewBox="0 0 24 24" width="60%" height="60%" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;

}

function catIcon(id,color,size){
  const fn=SVGICONS[id];

  const wrap=document.createElement('div');
  wrap.style.cssText=`width:${size}px;height:${size}px;border-radius:18px;overflow:hidden;flex-shrink:0;`;
  wrap.appendChild(fn(color));
  return wrap;
}

const CR=[{id:"salaire",l:"Salaire",i:"🪙"},{id:"freelance",l:"Freelance",i:"⚡"},{id:"autres_revenus",l:"Autres",i:"🫧"}];

const AC=[...CR,...CD];

let unsub=null;

/* === DOM === */
function h(tag,p,...k){
  const e=document.createElement(tag);
  if(p)for(const[a,v]of Object.entries(p)){
    if(v==null||v===false)continue;
    if(a==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(a.startsWith("on"))e.addEventListener(a.slice(2).toLowerCase(),v);
    else if(a==="value")e.value=v;
    else e.setAttribute(a,v);
  }
  for(const c of k.flat(9)){if(c==null||c===false)continue;e.append(c.nodeType?c:String(c));}
  return e;
}
function sv(t,a){const e=document.createElementNS("http://www.w3.org/2000/svg",t);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}
function set(u,nr){Object.assign(S,u);if(!nr)render();}
function render(){const r=document.getElementById("root");r.innerHTML="";r.appendChild(ui());}

/* === FIREBASE === */
function sub(){
  if(unsub)unsub();
  unsub=db.collection("budgets").doc("famille").onSnapshot(d=>{
    if(d.exists){const x=d.data();set({tx:x.transactions||[],gl:x.goals||[],ch:x.charges||[]});}
    else db.collection("budgets").doc("famille").set({transactions:[],goals:[],charges:[]});
  });
}
async function save(tx,gl,ch){
  const sb=document.getElementById("sb");if(sb)sb.style.display="flex";
  ch=ch||S.ch;
  try{await db.collection("budgets").doc("famille").set({transactions:tx,goals:gl,charges:ch});}catch(e){console.error(e);}
  if(sb)sb.style.display="none";
}

/* === HELPERS === */
function sl(t){return h("div",{style:{fontSize:"19px",color:T.mu,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"10px"}},t);}
function nb(t,fn){return h("button",{style:{width:"40px",height:"40px",borderRadius:"12px",border:`1.5px solid ${T.bd}`,background:T.sf,color:T.ac,fontSize:"28px",cursor:"pointer",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},onClick:fn},t);}
function rng(pct,color,sz=52){
  const r=(sz-8)/2,ci=2*Math.PI*r,d=Math.min(pct/100,1)*ci;
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width",sz);s.setAttribute("height",sz);s.style.transform="rotate(-90deg)";
  s.append(sv("circle",{cx:sz/2,cy:sz/2,r,fill:"none",stroke:color+"22","stroke-width":6}),sv("circle",{cx:sz/2,cy:sz/2,r,fill:"none",stroke:color,"stroke-width":6,"stroke-dasharray":`${d} ${ci-d}`,"stroke-linecap":"round"}));
  return s;
}
function bdg(amt,type){const c=type==="revenu"?T.gr:T.rd;return h("span",{style:{fontWeight:700,fontSize:"19px",color:c,background:c+"18",borderRadius:"10px",padding:"4px 9px",whiteSpace:"nowrap"}},(type==="revenu"?"+":"-")+fmt(amt));}

    )

function trend(){
  const bars=[];let m=S.vm,y=S.vy;
  for(let i=5;i>=0;i--){
    const d=S.tx.filter(t=>{const dt=new Date(t.date);return dt.getMonth()===m&&dt.getFullYear()===y&&t.type==="depense";}).reduce((s,t)=>s+t.amount,0);
    bars.unshift({l:MO[m],v:d,a:i===0});const p=pm(m,y);m=p.m;y=p.y;
  }
  const mx=Math.max(...bars.map(b=>b.v),1);
  return h("div",{style:{display:"flex",alignItems:"flex-end",gap:"5px",height:"60px"}},
    ...bars.map(b=>{const hh=Math.max(4,(b.v/mx)*60);return h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}},h("div",{style:{width:"100%",height:`${hh}px`,background:b.a?"linear-gradient(180deg,#FB923C,#FCD34D)":T.ac+"22",borderRadius:"5px 5px 0 0"}}),h("span",{style:{fontSize:"14px",color:b.a?T.or:T.mu,fontWeight:b.a?700:400}},b.l));}));
}
function anChart(data){

function gCard(g){

  const done=pct>=100;
  const rw=h("div",{style:{position:"relative",width:"52px",height:"52px",flexShrink:0}});
  rw.appendChild(rng(pct,g.color,52));
  rw.appendChild(h("div",{style:{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"32px"}},g.icon));

    h("button",{style:{position:"absolute",top:"14px",right:"14px",background:"none",border:`1px solid ${T.bd}`,color:T.mu,borderRadius:"8px",width:"26px",height:"26px",cursor:"pointer",fontSize:"18px"},onClick:()=>save(S.tx,S.gl.filter(x=>x.id!==g.id))},"✕"),

function authScreen(){
  const s=S;
  async function go(){
    if(s.al)return;set({aerr:"",al:true},true);
    try{
      if(s.am==="register"){
        if(!s.an.trim()){set({aerr:"Entrez votre prénom",al:false});return;}
        const c=await auth.createUserWithEmailAndPassword(s.ae,s.ap);
        await c.user.updateProfile({displayName:s.an.trim()});
